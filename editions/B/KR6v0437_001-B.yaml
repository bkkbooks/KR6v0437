body:
  text: 入唐前權僧正法印大和尚位榮西錄考前以下十字壽本作律師二字茶也考也下壽本有末代二字養生之仙藥也考也字傍原本有假名字今改為句點壽本無也字而有人倫二字延齡之妙術也山谷生之其地神靈也人倫採之其人長命也天竺唐土同貴重之我朝日本曾考曾壽水作昔嗜愛矣考矣壽本作之古考古原本作吉今據群本今奇特仙藥也考古以下七字壽本作從昔以來自國他國俱尚之今更可指乎況末量養生之良藥也廿五字不可不摘乎考摘乎二字壽本作斟酌矣三字謂劫初人與天人同考人以下五字壽本作時人四大地肉骨水血火煖氣風動作力堅固與諸天身同廿三字今人漸下漸弱四大五藏如朽考今以下十二字壽本作末世時人骨肉怯弱如朽木矣然者考然者二字壽本無針炙竝傷考傷壽本作痛湯治亦不應乎若好考詳本作如此考此字壽本作其治方者漸弱漸竭不可不考不字壽本無怕者歟昔醫方不添削而治今人斟酌寡者歟考昔以下十五字壽本無伏惟天造萬像造人以考以字壽本在像下為貴也人保一期考期下壽本有以字守命考命下群本有以字為賢也其保一期之源考源上壽本有根字在于考于壽本無養生其示養生之術考術下壽本有計字可安五藏考壽本注云肝心脾肺又藏作臟下同五藏中心藏為王考群本作主乎建立心藏考壽本作心藏建立之方喫㭟是妙術也厥考厥下壽本有忘字心藏弱考弱字壽本無則五藏皆生病考皆以下三字壽本作無力也忘五藏則身命有厄乎十二字寔印土耆婆往而考而下壽本有隔字二千餘年末世之血脈誰診考診壽本作間乎漢家神農隱而考而下壽本有送字三千餘歲近代之藥味詎理乎然則無人于詢考傍訓原本作今據群壽兩本病相徒忠徒危考危原本及壽本作厄今從群本也有誤于請治方空炙考炙壽本改失恐非空損也偷聞今世之醫術則含藥而損心地病與藥乖故也帶𬉹而考而壽本作即夭身命脈與考與原本無今據群本壽本作而𬉹戰故也不如訪大國之風示近代治方乎仍立二門示末世病相留贈考贈群本作賜後昆考昆壽本作共利群生矣于時建保二年考年群本無甲戌歲考歲群本無春正月日考建以下十一字壽本作承元五年辛未歲春正月一日十二字應知壽本是初稿本而原本及群本是二年後之再治本謹敘第一五藏和合門第二遣除鬼魅門第一五藏和合門者尊勝陀羅尼破地獄法考法字壽本作儀軌二字祕鈔云一肝藏好酸味二肺藏好辛味三心藏好苦味四脾藏好甘味五腎藏好醎味又以五藏充五行木火土金水也又充五方東南西北中也考群本作東西南北中也肝東也春也木也青也魂也眼也肺西也秋也金也白也魄也鼻也心南也夏也火也赤也神也舌也脾中也四季末考末壽本作終也土也黃也志也口也腎北也冬也水也黑也想也骨髓也耳也此五藏受味不同考同下壽本有一藏二字好味多入則其藏強尅傍藏互生病其辛酸甘醎考醎下壽本有之字四味恆有而考而壽本作之食之苦味恆無故不食之是故四藏恆強心藏恆弱故恆考恆群本無生病考病下壽本注云其病日本名云心助也若心藏病時一切味皆違食則吐之動不食考食下壽本有萬物二字今喫考喫壽本作用茶則心藏強無病也考心以下六字壽本作治心藏為令無病也八字可知心藏有病時人皮肉之考之字壽本無色惡運命依此減也日本國不食苦味乎考日以下八字壽本作自國他國調菜之味同之皆以缺苦味乎十六字但大國獨考獨字壽本無喫㭟故考故字壽本作我國不喫茶大國人八字心藏无病亦長命也考也字壽本作不得長病羸瘦乎七字我國多考多群本作與有病瘦人考多以下五字壽本作人心藏有病多長病羸瘦乎十一字是不喫㭟之所致也若人考人下壽本有五藏不調四字心神不快爾考爾壽本無時必可考可壽本無喫㭟調心藏除愈萬病矣心藏快之時諸藏雖有病不強痛也又五藏曼荼羅儀軌鈔云考云字壽本無以祕密真言治之肝東方何閦佛也又藥師佛也金剛部也即結獨古考古群本作鈷印誦考誦原本作訓今從群壽兩本考梵字群本作梵怛羅字字真言加持肝藏永無病也心南方寶生佛也虛空藏也即寶部也即結寶形考群本壽本形下有印字誦考梵字下壽本有怛羅字三字群本作梵乞里字字真言加持心藏則無病也肺西方無量壽佛也觀音也即蓮華部也考群本也下有即字結八葉印誦考梵字下壽本有乞里字三字群本作梵吽字字真言加持肺藏則無病也腎北方釋迦牟尼佛也彌勒也即羯摩考群本摩作磨部也考群本也下有即結羯磨考磨壽本作摩印誦考梵字下壽本有惡字二字字真言加持賢藏則考則壽本無無病也脾中央大日如來也般若菩薩也佛部也結五古考古群本作鈷印誦考梵字下壽本有鍐字二字字真言加持脾藏則考則壽本無無病也此五部加持則內之治方考方壽本作術也五味養生則外療考群本療作病治考治壽本作持而傍有治歟二字也內外相資保身命也其五味者酸味者是柑子橘柚考柚下壽本有酢字等也辛味者是薑胡椒高良薑等也考群本無也甘味者是砂糖等也又一切食以甘為性也考又以下九字壽本無苦味者考群本者下有是茶青木香等也醎味者是鹽等也心藏是五藏之考之壽本無君子也㭟是苦考苦字壽本無味考味下壽本有之字上首也苦味是諸味考味下壽本群本有之字上首考首群本作味也因兹心藏愛此味心藏興則考心以下四字壽本作以此味建立此藏七字安諸藏也若人眼有病可知肝藏損也考群本也下有以酸性藥可治之考群本之下有若耳有病可知賢藏損也以醎考群本醎下有性藥可治之鼻有病可知肺藏損也以辛性藥可治之舌有病可知心藏損也以苦性之考群本無之字藥可治之口有病可知脾藏之損也以甘性藥可治之若身弱意消者可知亦考群本作又心藏之損也頻喫茶則氣力強盛也其茶功能并採調時節載左有六箇條矣一茶名字考一以下四字壽本作一者叨名字章六字一爾雅曰檟苦茶考爾上群本有檟字檟苦茶群壽兩本檟苦茶牒似是一名茆考茆下群本有冬㭟二字注注有按茆今本不見六字一名茗早採者云茶晚採者云茗也西蜀人名曰苦茶西蜀國之名也又云成都府唐都考群本無都字西五千里外諸考外諸二字壽本作有此處一切七字物美也茶亦考亦壽本作必群本作又美也廣州記曰臯盧茶也一名茗廣州宋朝南在五千里外即考外即二字壽本作有此處三字與崐崙國相近崑崙國亦與天竺相隣考相近以下十一字壽本作并人竺相近五字即考即壽本無天竺貴物傳於廣州考傳以下四字壽本作生於此三字依土宜美茶亦考群本作又美也此州無雪霜溫煖冬不著綿衣是故茶味美也考群本也下有茶字壽本有仍字美名云臯盧也考群本無也字此州瘴熱之地也北方人到十之九厄考厄群本作危萬物味美故人多侵然者食前多考多壽本無喫檳榔子考子下壽本有客人強多喫之六字食後多考多壽本無喫茶客人考人下壽本有來字強多令喫為不令身心損壞也仍考仍下壽本有貴重二字檳榔子與茶極貴重考極貴重三字壽本無矣南越志曰過羅茶也考也群本無更有茗苦澀謂之過羅六字注一名茗陸羽考羽壽本作州茶經曰茶有五種名一名茶考茶下群本有早取謂之四字注二名檟考檟下群本有周公謂之四字注三名蔎考蔎下群本有南人謂之四字注四名茗考茗下群本有晚取謂之四字注五名荈加茆為六魏王花木志曰茗云云考群本茗下有葉也二字二茶樹形花葉形考二以下七字壽本作二者明樹形花葉形章九字爾雅註曰樹小似梔子木云考群本木下有葉其色白四字桐君錄曰茶花考花群一本作葉狀如梔子花其色白云云考群本無花其色白云云六字茶經曰葉似梔子葉花白如薔薇也考也下壽本群本有云云二字群本云云下有注云實如栟櫚蔕如丁香如胡桃三茶功能考三以下四字壽本作三者明功能章六字吳興記曰烏程縣西有溫山出御茆云云考群本願注云按茶經茆作舜壽本無云云二字是云供御也考也下壽本有君子召物皆名稱供御九字貴哉考哉下壽本有茶乎二字群本無貴哉二字宋錄曰此甘露也何言茶茗焉考焉群本作云云二字原本焉字傍有假名二不審廣雅曰其飲茶醒酒令人不眠云云考云下壽本有眠萬病之根源也無病不眠十一字博物志曰飲真茶令考群本令下有人字少考少壽本作小眠睡云云眠考眠下壽本有者字令人昧劣也亦眠病也考昧以下七字壽本作鈍根二字神農食經曰茶茗宜久服令人有考群本有下有力字悅志云云本草曰㭟味甘苦微寒無毒服即無瘻瘡考傍訓歟壽本左傍有訓也小便利睡少考壽本作小去病考群本作疾壽本作痤渴消宿食云云考群本無云云二字一切病考病壽本作不豫二字發於宿食考群本作云云非也消故無病也考也下壽本有宿食三日五日食也八字花他考花他群本作華陀食論曰茶久食則益意思云云身心無病故益意思考群本意思二字作思意二字也考身以下九字壽本無壺居士食忌曰茶久服羽化與韮同食令人身重云云考云字壽本無而更有韮草此方無之韮之類也十字群本願注云按茶經服作食自作體陶弘景新錄曰喫茶輕身換骨苦云云考群本無云云二字脚氣即骨苦也考也下壽本有脚氣妙藥何物如之哉九字桐考原作桐據壽本群本改君錄曰茶煎飲令人不眠考眠下群本有云云二字不眠則無病也考也下群本有云云二字杜育荈賦曰茶調神和內倦懈康除云云考壽本無云云二字內者五內也考五內也三字壽本無五藏異名也考也下壽本有治五藏不和在茶而已又五內云也十四字張盂考盂群本壽本作孟陽登成都樓詩曰芳茶冠六清考群本頭注云按茶清作情溢味播九區人生苟安樂兹土考土群本作物聊考聊壽本作所可娛云云六清者六根也考六以下六字壽本作六根清明云六清也八字九區者漢地九州云也區者城也考城群本作城壽本無區者城也四字而有漢地九分立州今卅六群考群恐郡字三百六十八州十六字注茶生用菜苟字菜也考茶以下八字壽本作生苟者生用菜身安樂無病云也苟則菜也可娛者樂也廿三字本草拾遺曰臯盧苦平依考依群本作作字飲止渴除疫不眠考眠壽本作睡利水道明目生南海諸山中南人極重之云云考群本無云云二字除溫疫病也南人者廣州等人也此州廣州以下至此州七字壽本作廣州之洋有孤絕之島稱曰海南又云廣南也又近近有多洲渚此等皆稱日南也今南人即是等也廣州即四十二字瘴熱地也瘴此方赤蟲病云也考群本無也字唐都人補受領考補受領壽本作知州二字到此地十之九不歸考歸下壽本有北方二字食物美味考喫下壽本有食字而難消故多食檳椰子喫茶若考若壽本無不喫考喫下壽本有多食二字則侵身考身下壽本有藏不存百之一也無寒之地故十二字也日本國大寒之地故無此難尚南方熊野山夏不參詣為瘴熱之地故也天台山記曰茶久服生羽翼云云考壽本云云二字作是字身輕考輕下壽本有而可飛三字故云爾也白氏六帖茶部曰供御云云非卑賤人食用也考非以下七字壽本作非百姓下人所宜故貴重而如此云也十五字白氏文集詩曰午茶能散睡云云考睡群本作眠午者食時也茶食後喫故云午茶也食消則無眠也考食以下六字壽本無眠群本作病白氏首夏詩曰或考或原本作惑今據群本壽本無飲一甌茗云云甌者茶盞之美名也口廣底狹也為不令茶考茶下壽本有字久寒器之底狹深也小器名也考也下壽本有淺茶非也六字又曰破眠見茶功云云喫茶則終夜不眠而明日考日群本作目壽本無明日二字不苦身矣又曰酒渴春深一盃考盃群本作盂茶云云飲酒則喉乾引飲也考也字壽本無其時唯可喫茶勿飲他湯水等飲他湯水等必考等必二字壽本無生種種病考也上壽本群本有故字也四採茶時節考四以下五字壽本作四者明採茶時節章八字茶經曰凡採茶在二月考二月下壽本群本有三月二字四月之間云云考云云二字壽本作也一字宋錄曰大和七年正月吳蜀貢新茶皆冬中作法為之詔曰所貢新茶宜於立春後造云云意者冬考冬下壽本有中字造考造下壽本有則字有民考民壽本作百姓民下群本有之字煩故也自此以後皆立春後造之考之字群本無之下壽本有過之二字唐史曰貞元九年春初稅茶考茶下群壽兩本俱有云云二字茶美名云早春又云牙茗此儀考儀群本作義也宋朝比考比群本作此壽本作此比二字採茶作法內裏後菌有茶園元三之內集下人入茶菌中言語高聲徘徊往來考來下壽本有終日二字則次之日茶芽考芽字群本壽本無一分二分萌以銀考銀群本作錄之鑷子考鑷子壽本作毛拔採之而後作䗶考䗶群本作蠟壽本無茶一匙之直及千貫矣五採茶樣考五以下四字壽本作五者明採茶樣章七字茶經曰雨下不採茶雖不雨而亦考亦群本作又字壽本無有雲考雲下壽本有亦字不採不焙不蒸用力弱故也六調茶樣考六以下四字壽本作六者明調樣章六字考原本作茶調樣今據群本見宋朝焙茶樣則考則壽本無朝採即蒸即焙之懈倦怠慢之者不可為事也焙棚敷紙紙不惟樣考樣壽本作許誘火考火下壽本有入字工夫而焙之不緩不急考急群本作怠竟考竟壽本作終夜不眠夜內可焙畢也即考可以下五字壽本作焙上二字盛好瓶以竹葉堅封瓶口不令風入內考封以下八字壽本作閇一字則經千考千群本壽本作年歲而不損矣考矣下壽本有欲採時人夫并食物炭薪巨多割置而後採之而已廿字已上末世養生之法如斯考已上字壽本作右法下同有記錄二字抑我國考國下壽本有醫道之三字人不知採茶法故不用之還譏曰非藥云云是則不知茶考茶下壽本有之字德之所致也榮西在唐之昔見貴重茶如眼有種語不能具注給忠臣考給忠臣三字壽本作帝王有忠臣必給茶八字施高僧考施高僧三字壽本作僧說妙法則施茶七字古今儀考儀群本作義同考壽本作今昔同儀唐醫云若不喫茶人失諸藥効不得治痾心藏弱故也庶幾末代良醫悉之矣考唐醫以下至之矣卅字壽本作式只在茶之法若不喫茶昔諸藥無効心藏弱故也庶幾末代上中下諸人悉之今依仰撰之後不可添削矣四十二字
