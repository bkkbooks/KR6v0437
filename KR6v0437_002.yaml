body:
  text: 入唐前權僧正法印大和尚位榮西録考前以下十字壽本作律師二字位字群本無第二遣除鬼魅門者大元帥大將儀軌祕鈔曰末世人壽百歲時四衆多犯威儀不順佛教之時國土荒亂百姓亡喪于考于壽本作之時有鬼魅魍魎亂國土惱人民致種種之病無治術醫明無知藥方無濟長病疲極無能救者爾時持此大元帥大將心呪念誦考誦下群壽兩本有者字鬼魅退散衆病忽然除愈行者深住此觀門修此法者少加功力必除病復考復下壽本有依字此病祈三寶考祈三寶壽本作三寶祈請無其驗則人輕佛法不信臨爾之時大將還念本誓致佛法之效驗除此病還考群本無還字興佛法特加神驗仍至得果證略鈔以之案之近年考年群本作歲以來之病相即是也考也下壽本有即彼儀軌有印術而已榮西恆得此意治之多有驗矣草一字其相非寒非熱非地水非火風是故近比考群本作頃醫道人多謬矣即病相有五種若左考即以下八字壽本無一飲水病考一下壽本有者字此病起於冷氣考冷氣二字壽本作喫濃味則以鹽味為厄九字若服桑粥則三五日必有驗永忌薤蒜蔥勿食矣鬼病相加故他考他原本似仵今從群本方無驗矣以冷氣為根源耳服桑粥無百之一不平復矣忌薤是考鬼病以下全文壽本還增故作鬼病必惡葷腥耳二中風手足不從心病考二下壽本有者字此病近年以來衆矣考近至矣六字壽本無亦考亦原本作赤群本作又壽本無今改亦起於冷氣等考等壽本作濕氣以針炙出血考出血壽本無湯治流汗考流汗壽本無為厄害考害壽本無永却火忌浴考永以下五字壽本作若不近火不浴湯七字只如常時考常時壽本作平體時三字不厭風不忌食物漫漫服桑粥桑湯漸漸平復無百一厄若欲沐浴時煎桑一桶可浴三五日一度浴之莫流汗是第一妙治也若湯氣入流汗則必成不食病故也冷氣水氣溫氣此三種治方若考群本作如斯尚又加鬼病也考漫漫以下全文壽本作漫漫治則漸平復是又服桑粥桑湯若欲沐浴時煎桑湯行水一桶二桶三五日一度浴之浴時不垂汗是治方也若湯氣上則必不食故也三不食病考三下壽本有者字此病復考復壽本無起於冷氣考冷氣壽本作濕氣好浴考好浴上壽本有好火二字流汗向火考流以下四字壽本無為厄夏冬同以涼身為妙術又服桑粥考粥下壽本有桑字湯漸答考答群本無漸平愈若欲忩考忩群本作忩差炙治湯治彌弱考弱壽本作增無平復矣已上三種病皆發考發壽本作起於冷氣故同桑治考故以下四字壽本無是考是壽本作又末代多考多壽本無鬼魅所著故考故壽本作也以桑考桑下壽本有木字治之桑下鬼類不來又仙藥上首也考桑下至也十二字壽本作必有效三字勿疑矣考矣壽本作二字四瘡病考四下壽本有者字近年以來考近以下四字壽本無此病發於水氣等雜熱也考等以下四字壽本作冷氣而三字非丁考群本作疔非癰然考非丁以下五字壽本作非癰丁等之惡瘡七字人不識考識壽本作知而多誤矣但自冷氣水氣發故考但以下八字壽本作但起於冷氣故六字大少考少壽本群本作小瘡皆不負火依此考依此二字壽本作因不負火四字人皆疑為惡瘡尤愚也炙則得火毒即腫增火毒無能治者大黃寒水寒石寒為厄依炙彌腫依寒彌增可怪可斟酌若瘡出則不問強軟不知善惡牛膝根搗絞以汁傅瘡乾復傅則傍不腫熟破無事濃汁出付楸葉惡毒之汁皆出世人用車前草尤非也永忌之服藥粥藥湯五香煎若強須炙依方可炙之謂初見瘡時蒜橫截厚如錢厚付瘡上艾堅押如少考少群本作小豆大炙蒜上蒜焦可替不破皮肉為祕方及一百狀考群本作壯即萎火氣不答必有驗炙後傅牛膝汁并可付楸葉尚不可付車前草付則傍腫依不出惡汁故日本多用車前草不識藥性故也可忌可忌考第二可忌群本作云云又有芭蕉根神效矣皆瘡妙藥考藥下群本有也字考炙則以下全文凡十二行壽本有少差如左近年以來瘡大小俱炙則腫增腫增則無治也火毒無能治者故也水寒石寒為厄矣決定應死之業何依炙可活不定業雖不炙何死哉不炙活者多炙活者少尤可斟酌若瘡出則不問強軟不知善惡牛膝根搗絞以汁付瘡乾又付則不腫傍只瘡許腫熟破無事矣是服桑粥桑湯兼服五香煎矣五腳氣病考五下壽本有者字此病發於夕之食飽滿考滿下壽本有若字入夜而飽考而飽壽本作食一字飯酒考飯酒群本作酒食為厄午後不飽食為治方考午後以下八字壽本無是亦考亦壽本群本作又服桑粥桑湯考湯下壽本有又服二字高良薑考薑下壽本有并字茶奇特養生妙治也考奇以下七字壽本作為妙治矣四字新度醫書云患腳氣人晨飽食午後勿飽食等云云長齋人無腳氣是此謂也近比考比群本作頃人萬病稱腳氣尤愚也可笑哉呼病名而不識病治為奇為奇考近比以下全文凡二行壽本無第二為奇群本作云云已上五種病皆末世鬼魅之所致也然考群本無然字皆以桑考桑下壽本有木字治事考事壽本作之者頗有于受口傳唐醫矣考頗以下九字壽本無亦考亦群本作又桑樹是諸佛菩提樹擕此木天魔猶以不競況諸餘鬼魅附近乎今得唐醫口傳治諸病無不得效驗矣近年以來人皆為冷氣侵故桑是妙治方也人不知此旨多致夭考致夭群本作大害瘡稱惡瘡諸病號腳病考病壽本作氣而不知所治最不便近年以來五體身分病考病字傍恐誤皆冷氣也其上他疾相加得其意治之皆有驗今腳病考病群本作痛非腳氣是又冷氣也桑牛膝高良薑等其良藥也桑方注在左考亦桑以下全文凡七行壽本頗異如左桑樹是過去諸佛成道之靈木也以此樹為乳木護摩時鬼魅悉退散馳走又患災法相應木也桑樹下鬼魅不來是故此樹為萬病之藥也若人携此木為念珠為杖為枕天魔尚以不得便況諸餘下劣鬼魅附近乎是以榮西以此木治諸病無不得效驗矣有情人察之近年以來病皆為冷氣侵故桑是第一之治方也人不知此旨多致夭害瘡稱惡瘡諸病稱腳病並是惡附高大之名不知所治尤不便事惡瘡無藥腳病無治故云惡也勿就矣腳病無治者近年痛腳則冷氣故也不用冷氣故腳病不可平愈惡瘡無藥者近年以來無惡瘡只是冷氣雜熱故今名惡瘡則無治方也因名得力增氣勢故也以桑木治之自得其驗矣桑方在左注之一桑粥法宋朝醫曰桑枝如指三寸截三四細破黑豆一把俱投水三升灼料考灼群本作炊煮之豆熟桑被剪考群本剪作煎即却桑加米依水多少計米多少作薄粥也冬夜雞鳴期夏夜夜半初煮夜明即考群本無即字煮舉空心服之不添鹽每朝勿懈久煮為藥也朝食之則其日不引水不醉酒身心靜也信必有驗桑當年生枝尤好根莖大不中用桑粥總衆病藥別飲水中風不食之良藥考藥下群本有也字考宋朝以下全文凡六行壽本如左黑豆一把桑枝口一寸長三寸考若納指許可計細破與豆俱入水三升考炊料煮之豆桑破煎即取木加米一把隨水多少煮浮粥也冬夜雞鳴之期夏夜半以前初煮夜明即煮畢空心服之不副鹽少分服後含御菜也每朝無懈久煮為藥頓煮非藥若無效可知不熟煮也朝食之其日不引水不醉酒身心靜也信心有驗矣竪粥無效但不似餘物也考桑當年生枝粥煎共彌妙之無者亦不之一桑煎法考桑煎法群本在服桑木法後桑枝二分許考群本作計截燥之木角燋許燥可割置三升五升盛袋久持彌好乎臨時水一升許木半合許入之煎之服之或考或原本作惑今據群本不燥煎服無失生木復考復群本作又宜新度醫書云桑水氣腳氣考腳氣群本無肺氣風氣癰腫遍體風庠乾燥四肢拘攣考拘攣原本似物攣今依群本改上氣眩暈咳嗽口乾等疾皆治之常服消食利少考群本少作小便輕身聰明耳目云云仙經云一切仙藥不得桑煎不服云云就中飲水不食中風最祕要也考此章壽本如左截桑枝如雙六截破燥之木角燋許燥之割置三升五升可盛袋歟久持彌好乎臨時水一升許入木半合許煎之服之或不燥而煎服無失生木又不苦矣水氣腳氣癰腫風氣皆治矣一服桑木法考服桑木法群本在桑煎法前鋸截考鋸截壽本作以鋸截之四字屑細以五指撮考撮壽本作取之投美酒飲之女人血氣考氣下壽本有又字能治之身中腹中萬病無不差是仙術也考是以下四字壽本作仙術在之不可不信矣恆服得長壽無病也考恆以下八字壽本無一含桑木法如齒木削之常含之口舌齒并無疾口常香諸天神愛樂音聲魔不敢附近末代醫術何事如之哉以土下三尺入根彌好土上頗有毒若口喎目喎皆治矣世人皆所知也土際有毒故皆用枝也考此章壽本少差如左如齒木削之常口含之口無病齒無失口常香魔不附近末代醫術何事如之哉以根作彌好土下三尺入者妙也土上自有毒土下個無毒矣口咼目咼皆治直也人皆所知也一桑木枕法如箱造考造下壽本有之字可用枕枕之則無頭風不見惡夢鬼魅不附近目明乎功能亦考亦壽本無多矣考矣壽本作不能注過之一服桑葉法四月初採影干秋九月十月考十月壽本無三分之二落一分殘枝採又影干考干下群本有和合二字末一如茶法服之腹中無疾身心輕利夏葉冬葉等分以稱計之是皆仙術而已考此章又影干以下壽本同一葉可惜一服桑椹法熟時收之日乾為末以蜜丸桐子大空心酒服四十丸每日服考群本服下有之字久服身輕無病是皆本文耳日本桑頗力微一服高良薑法此藥出於大宋國高良郡唐土契丹考契丹原本作熱舟據群本改高麗同貴重之末世妙藥只是許考群本許作計也治近比考群本比作頃萬病必有效即細末一錢投酒服之斷考原作折據群本改酒人以湯水粥米飲服之又煎服之皆好乎多小考群本小作少早晚答以為期更無毒每日服齒動痛腰痛肩痛腹中萬病皆治之腳膝疼痛一切骨痛一一治之捨百藥而唯茶與高良薑服無病云云近年冷氣侵故也治試無違耳一喫茶法極熱湯考群本湯下有以字服之方寸匙二三匙多少隨意但湯少好其又隨意云云殊以濃為美飯酒之考殊以下八字群本無次必喫茶消食也引飲之時唯可喫茶飲桑湯勿飲他湯桑湯茶湯不飲則生種種病茶功能上記畢此茶諸天嗜愛故供天等矣勸孝文云孝子唯供親云云是為令父母無病長壽也考也以上十八行壽本爾宋人歌云疫神捨駕禮茶木云云本草拾遺云止渴除病考詳本病作疫云云貴哉茶乎上通諸天境界下資人倫矣諸藥各為一種病之藥茶能為萬病藥而已云云考宋人歌以下全文壽本有少差如左宋人歌云疫神捨駕禮茶水是故本草拾遺云注文之名也止渴除疫云云貴哉茶乎上通神靈諸天境界下資飲食侵害之人倫矣諸藥唯主一種病各施用力耳茶為萬病之藥而已一服五香煎法一者青木香一兩考壽本云其性苦辛二者沈香一分考壽本云其性苦辛三者丁香二分考丁下群壽兩本有子字又壽本云其性苦辛四者薰陸香一分考壽本云其性苦辛五者麝香少少考少少群本作少一字少少下壽本有大熱故不多加也七字次云其性苦辛右五種各別末後和合每服一錢沸湯和服五香和合之志為令治心藏也萬病起於心故也五種皆其性苦辛是故心藏妙藥也榮西昔在唐時從天台山到明州時六月十日也天極熱人皆氣絶于時店主丁子一升水一升半許久煎二合許與榮西令服之而言法師遠涉路來汗多流恐發病歟仍令服考服下群本有之字也云云其後身涼清潔心地彌快矣以知大熱之時涼大寒之時能溫也此五種隨一有此德不可不知矣考右五種以下全文壽本有參差如左右五種同時和合末每服一錢沸湯點服或煎服其用弱注不末只煎五香和合之志為令服青木香也或只青木香服之意治心藏也榮西昔在唐時從天台山到明州時六月十日也天極熱人皆氣絶乎于時店主取銚子盛十子考十子恐丁子八分即添水滿銚子良久煎之不知何要乎煎了茶盞之大滴入持來與榮西令服稱法師天熱之時遠涉路來汗多流恐有不快仍與令服也云云令炊一升水一升一半歟煎只二合許也其後身涼心地清潔也以知大熱之時能涼大寒之時能溫也此五種隨一有此德不可不知矣冬月到亦同前云云五香煎德與茶同仍可服也五香不整足者隨一可服歟已上考已字群本無末世養生法聊得感應記録畢是皆非自由之情以此方治近比諸病無相違乎諸方中桑治方勝是因為仙藥也本草云煎桑枝服療水氣等云云前出之取要言之服茶服桑之後諸藥服用必有效驗仙經文先出舉此等記録皆有稟承于大國乎若不審之輩到大國詢問無隱歟今為利生謹録上後時不改矣考已上以下全文壽本參差如左已上末世養生記蒙佛加被一一記録畢是唯依大國口傳非自由之情以此方治諸病見之無相違乎抑桑木是仙藥也仙人有二種仙人一苦行仙二服藥仙也苦行仙者斷食味服一米一粟等久活命服藥仙者服種種藥以久保命其中服桑木仙能久保也上件桑治方勝諸方是依為仙藥也本草云煎桑枝服療水氣肺氣腳氣癰腫兼風氣常服療遍體風癢乾燥又治眠暈歟又消食利小便身輕耳目聽明令人光澤又療口乾矣仙經云一切仙藥不得桑煎則不服云云先服桑煎後服諸仙藥以知桑是又仙藥之上首乎茶與桑並服貴重無高下二俱仙藥之上首養生之妙術而已此等記録皆有所又稟承在大國乎不春之到大國詢之無隱歟今依仰之旨録上後時不改章矣此記録後聞云考云群本作之喫茶人瘦生病云云此人不知己所迷豈知藥性自然用哉復於何國何人喫茶生病哉若無其證者其發詞空口引風徒毀茶已考已群本作也無半錢利又云高良薑熱物也云云是誰人咬而生熱哉不知藥性不識病相莫説長短矣考此後聞記壽本無原本奧書寫本云寬喜元年己丑六月十七日午時從南無佛戲笑時歌詠時鬬諍時人作祭時已上四時也永仁五年六月十九日於磯長僧坊中房二階書寫畢宗明為利益衆生也此書御覽人人必必唱念佛十遍回向法界衆生自他同成無上道矣壽本奧書承元五年辛未正月三日無言行法之次酉染筆謹書之權律師法橋上人位榮西群本奧書右喫茶養生記以白蓮社空阿藏本書寫遂一校畢喫茶養生記壽本鎌倉扇谷壽福寺藏南北朝頃寫承元五年正月三日榮西初稿本校訂史料綱篡挂影寫本用群本群書類從第三百六十八建保二年正月日榮西再治本原本東京帝國大學文科大學藏永仁五年六月十九日寫本再治本一本文永仁本基他本校訂二句讀送假名一永仁本但句讀新加所永仁本存新加本書校訂關殊橋本進吉君助力得謹謝高楠順次郎識
